<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Player</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; background: #080d19; color: #edf2ff; }
    main { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 32px 0 56px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
    .nav { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    a { color: #9bbcff; text-decoration: none; border-radius: 6px; }
    a:hover { color: #c8d8ff; }
    a:focus-visible, button:focus-visible, .chapter:focus-visible {
      outline: 3px solid #ffd166;
      outline-offset: 3px;
      box-shadow: 0 0 0 6px rgb(255 209 102 / 0.18);
    }
    h1 { margin: 0; font-size: clamp(1.8rem, 4vw, 3rem); letter-spacing: -0.04em; }
    button { min-height: 44px; min-width: 44px; border: 1px solid #3a4663; border-radius: 999px; background: #192036; color: #edf2ff; padding: 10px 16px; cursor: pointer; white-space: nowrap; }
    button:hover { border-color: #8fb3ff; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 24px; align-items: start; }
    .panel { background: #12182a; border: 1px solid #25304a; border-radius: 20px; padding: 18px; box-shadow: 0 20px 80px rgb(0 0 0 / 0.28); }
    video { display: block; width: 100%; max-height: 72vh; background: #000; border-radius: 14px; }
    #message { margin-top: 14px; color: #aab6d3; }
    #message.error { color: #ffb4b4; }
    #chaptersPanel h2 { margin: 0 0 12px; font-size: 1.1rem; }
    #chapters { display: grid; gap: 8px; }
    .chapterRow { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: stretch; }
    .chapter { width: 100%; text-align: left; border-radius: 12px; border-color: #2a3654; background: #1a2237; padding: 12px 14px; white-space: normal; }
    .chapter small { display: block; color: #9fb0d0; margin-top: 4px; }
    .chapter.active { border-color: #8fb3ff; background: #223154; }
    .removeChapter { border-radius: 12px; border-color: #694154; background: #2a1620; color: #ffd7df; }
    .removeChapter:hover { border-color: #ffb4c2; }
    .hint { color: #9fb0d0; font-size: 0.9rem; line-height: 1.5; margin: 0 0 12px; }
    .labelControls { display: flex; align-items: end; gap: 8px; flex-wrap: wrap; }
    .fieldGroup { flex: 1 1 180px; display: grid; gap: 6px; }
    .fieldGroup label { font-size: 0.9rem; font-weight: 700; color: #edf2ff; }
    .labelControls input { min-height: 44px; box-sizing: border-box; width: 100%; min-width: 140px; padding: 10px 12px; border-radius: 12px; border: 1px solid #3a4663; background: #0b1120; color: #edf2ff; font-size: 1rem; }
    .labelControls input:focus-visible { outline: 3px solid #ffd166; outline-offset: 3px; border-color: #8fb3ff; box-shadow: 0 0 0 6px rgb(255 209 102 / 0.18); }
    .labelMsg { min-height: 1.2rem; font-size: 0.9rem; margin: 8px 0; color: #8fb3ff; }
    #sidePanel h2 { margin: 16px 0 12px; font-size: 1.1rem; }
    #sidePanel h2:first-of-type { margin-top: 0; }
    [hidden] { display: none !important; }
    @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="nav">
        <a href="/">← Back to library</a>
        <h1 id="title">Video Player</h1>
      </div>
      <form method="post" action="/logout">
        <button type="submit">Sign out</button>
      </form>
    </header>

    <div class="layout">
      <section class="panel">
        <video id="video" controls playsinline></video>
        <div id="message" role="status">Preparing player…</div>
      </section>

      <aside id="sidePanel" class="panel" hidden>
        <h2>Label this show</h2>
        <p class="hint">Play to where a group takes the stage, type a name, then mark the start — it becomes a chapter anyone can jump to.</p>
        <div class="labelControls">
          <div class="fieldGroup">
            <label for="boundaryName">Boundary name</label>
            <input id="boundaryName" type="text" placeholder="Group name (e.g. group-a)">
          </div>
          <button id="markBtn" type="button">Mark start here</button>
        </div>
        <div id="labelMsg" class="labelMsg" role="status"></div>
        <p><a id="editLabels" href="#">Open full label editor ↗</a></p>
        <h2>Chapters</h2>
        <div id="chapters"></div>
      </aside>
    </div>
  </main>

  <script src="/static/hls.min.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const show = params.get('show') || '';
    const showPath = encodeURIComponent(show);
    const video = document.getElementById('video');
    const title = document.getElementById('title');
    const message = document.getElementById('message');
    const chaptersPanel = document.getElementById('sidePanel');
    const chaptersEl = document.getElementById('chapters');
    const boundaryNameEl = document.getElementById('boundaryName');
    const labelMsgEl = document.getElementById('labelMsg');
    const editLabelsEl = document.getElementById('editLabels');
    let chapterCues = [];
    let nativeChapterTrack = null;
    video.setAttribute('aria-label', displayName(show));

    if (!show) {
      setMessage('Choose a show from the library before opening the player.', true);
    } else {
      const showTitle = displayName(show);
      title.textContent = showTitle;
      const playlistURL = '/hls/' + showPath + '/playlist.m3u8';
      const chaptersURL = '/hls/' + showPath + '/chapters.vtt';
      chaptersPanel.hidden = false;
      editLabelsEl.href = '/labels/' + showPath;
      document.getElementById('markBtn').addEventListener('click', markBoundary);
      // Keep the derived chapters.vtt path discoverable for tests/server parity;
      // live native markers are built from the fetched label boundaries below.
      void chaptersURL;
      loadVideo(playlistURL);
      loadChapters();
    }

    function setLabelMsg(text, isError) {
      labelMsgEl.textContent = text;
      labelMsgEl.style.color = isError ? '#ffb4b4' : '#8fb3ff';
    }

    // Capture the current playback position as a named chapter start and save it.
    async function markBoundary() {
      const name = (boundaryNameEl.value || '').trim();
      if (!name) {
        setLabelMsg('Enter a group name first.', true);
        return;
      }
      const start = Math.round(video.currentTime || 0);
      try {
        const labels = await fetchLabelsForEdit();
        labels.boundaries.push({ name: name, start: start });
        await saveLabels(labels);
        boundaryNameEl.value = '';
        setLabelMsg('Marked "' + name + '" at ' + formatTime(start) + '.', false);
        await loadChapters();
      } catch (error) {
        setLabelMsg('Could not save: ' + error.message, true);
      }
    }

    async function fetchLabelsForEdit() {
      const current = await fetch('/labels/api/' + showPath, { credentials: 'same-origin' });
      if (current.status === 401 || current.status === 403) {
        location.href = '/login';
        throw new Error('Redirecting to login.');
      }
      const labels = current.ok ? await current.json() : { video: show, boundaries: [], candidates: [] };
      labels.video = show;
      labels.boundaries = labels.boundaries || [];
      labels.candidates = labels.candidates || [];
      return labels;
    }

    async function saveLabels(labels) {
      const saved = await fetch('/labels/api/' + showPath, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(labels)
      });
      if (saved.status === 401 || saved.status === 403) {
        location.href = '/login';
        throw new Error('Redirecting to login.');
      }
      if (!saved.ok) {
        throw new Error(await saved.text());
      }
    }

    function setMessage(text, isError) {
      message.textContent = text;
      message.classList.toggle('error', Boolean(isError));
    }

    function rebuildNativeChapterTrack(cues) {
      if (cues.length === 0 && !nativeChapterTrack) {
        return;
      }
      if (!window.VTTCue) {
        return;
      }
      const track = ensureNativeChapterTrack();
      if (!track) {
        return;
      }
      if (track.cues) {
        for (let i = track.cues.length - 1; i >= 0; i--) {
          track.removeCue(track.cues[i]);
        }
      }
      for (const cue of cues) {
        if (cue.end <= cue.start) {
          continue;
        }
        track.addCue(new window.VTTCue(cue.start, cue.end, cue.label));
      }
    }

    function ensureNativeChapterTrack() {
      if (nativeChapterTrack) {
        return nativeChapterTrack;
      }
      if (!video.addTextTrack) {
        return null;
      }
      nativeChapterTrack = video.addTextTrack('chapters', 'Chapters', 'en');
      nativeChapterTrack.mode = 'hidden';
      return nativeChapterTrack;
    }

    function loadVideo(playlistURL) {
      if (window.Hls && Hls.isSupported()) {
        const hls = new Hls({
          xhrSetup: xhr => { xhr.withCredentials = true; },
          fetchSetup: (ctx, init) => {
            init = init || {};
            init.credentials = 'include';
            return new Request(ctx.url, init);
          }
        });
        hls.loadSource(playlistURL);
        hls.attachMedia(video);
        hls.on(Hls.Events.ERROR, (event, data) => {
          const status = data && data.response && data.response.code;
          if (data && data.fatal && (status === 401 || status === 403)) {
            location.href = '/login';
            return;
          }
          if (!data || !data.fatal) {
            return;
          }
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
            hls.startLoad();
          } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            hls.recoverMediaError();
          } else {
            hls.destroy();
            setMessage('Playback failed. Please return to the library and try again.', true);
          }
        });
        video.addEventListener('loadedmetadata', () => setMessage('Ready to play.', false), { once: true });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = playlistURL;
        video.addEventListener('loadedmetadata', () => setMessage('Ready to play.', false), { once: true });
      } else {
        setMessage('This browser cannot play HLS video.', true);
      }
    }

    async function loadChapters() {
      try {
        const response = await fetch('/labels/api/' + showPath, { credentials: 'same-origin' });
        if (response.status === 401 || response.status === 403) {
          location.href = '/login';
          return;
        }
        if (!response.ok) {
          chapterCues = [];
          renderChapters(chapterCues);
          rebuildNativeChapterTrack(chapterCues);
          return;
        }
        const data = await response.json();
        chapterCues = boundariesToCues((data && data.boundaries) || []);
        renderChapters(chapterCues);
        rebuildNativeChapterTrack(chapterCues);
      } catch (error) {
        chapterCues = [];
        renderChapters(chapterCues);
        rebuildNativeChapterTrack(chapterCues);
      }
    }

    // Build chapter cues from label boundaries (the persistent source of truth),
    // so chapters survive dev-server restarts even when the derived chapters.vtt
    // in the ephemeral HLS dir has been cleaned up.
    function boundariesToCues(boundaries) {
      const sorted = (boundaries || [])
        .map((b, index) => ({ boundaryIndex: index, start: Math.max(0, Number(b && b.start) || 0), name: String((b && b.name) || '') }))
        .filter(b => b.name)
        .sort((a, b) => a.start - b.start);
      return sorted.map((b, i) => ({
        start: b.start,
        end: Math.max(b.start + 0.001, i + 1 < sorted.length ? sorted[i + 1].start : b.start + 600),
        label: b.name,
        boundaryIndex: b.boundaryIndex
      }));
    }

    function displayName(slug) {
      return (slug || '')
        .replace(/[_-]+/g, ' ')
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
        .join(' ') || 'Video Player';
    }

    function renderChapters(cues) {
      chaptersEl.textContent = '';
      if (cues.length === 0) {
        const hint = document.createElement('p');
        hint.className = 'hint';
        hint.textContent = 'No chapters yet — mark one above.';
        chaptersEl.append(hint);
        return;
      }
      for (const cue of cues) {
        const row = document.createElement('div');
        row.className = 'chapterRow';
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'chapter';
        button.dataset.start = String(cue.start);
        button.innerHTML = '<span></span><small></small>';
        button.querySelector('span').textContent = cue.label;
        button.querySelector('small').textContent = formatTime(cue.start);
        button.addEventListener('click', () => {
          const wasPlaying = !video.paused;
          video.currentTime = cue.start;
          if (wasPlaying) {
            video.play().catch(() => {});
          }
        });
        const removeButton = document.createElement('button');
        removeButton.type = 'button';
        removeButton.className = 'removeChapter';
        removeButton.textContent = 'Remove';
        removeButton.setAttribute('aria-label', 'Remove ' + cue.label + ' chapter at ' + formatTime(cue.start));
        removeButton.addEventListener('click', () => removeChapter(cue));
        row.append(button, removeButton);
        chaptersEl.append(row);
      }
    }

    async function removeChapter(cue) {
      try {
        const labels = await fetchLabelsForEdit();
        let index = labels.boundaries.findIndex((boundary, i) =>
          i === cue.boundaryIndex &&
          String((boundary && boundary.name) || '') === cue.label &&
          Number(boundary && boundary.start) === cue.start
        );
        if (index < 0) {
          index = labels.boundaries.findIndex(boundary =>
            String((boundary && boundary.name) || '') === cue.label &&
            Number(boundary && boundary.start) === cue.start
          );
        }
        if (index < 0) {
          setLabelMsg('Could not find "' + cue.label + '" to remove. Refreshing chapters…', true);
          await loadChapters();
          return;
        }
        const [removed] = labels.boundaries.splice(index, 1);
        await saveLabels(labels);
        setLabelMsg('Removed "' + removed.name + '" at ' + formatTime(Number(removed.start) || 0) + '.', false);
        await loadChapters();
      } catch (error) {
        setLabelMsg('Could not remove chapter: ' + error.message, true);
      }
    }

    function formatTime(totalSeconds) {
      const total = Math.floor(totalSeconds);
      const hours = Math.floor(total / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const seconds = total % 60;
      return [hours, minutes, seconds].map(part => String(part).padStart(2, '0')).join(':');
    }

    video.addEventListener('timeupdate', () => {
      const active = chapterCues.find(cue => video.currentTime >= cue.start && video.currentTime < cue.end);
      for (const button of chaptersEl.querySelectorAll('.chapter')) {
        button.classList.toggle('active', active && Number(button.dataset.start) === active.start);
      }
    });
  </script>
</body>
</html>
