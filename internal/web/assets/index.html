<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Library</title>
  <link rel="stylesheet" href="/static/app.css">
  <style>
    body { display: grid; }
    main { width: min(920px, calc(100% - 32px)); min-height: 100vh; margin: 0 auto; padding: 48px 0; display: grid; align-content: center; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 32px; }
    h1 { margin: 0; font-size: clamp(2rem, 5vw, 3.5rem); letter-spacing: -0.05em; }
    p { color: var(--text-muted); line-height: 1.6; }
    .card { background: linear-gradient(180deg, var(--surface), var(--bg-deep)); padding: 24px; }
    ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 12px; }
    .show { display: flex; justify-content: space-between; align-items: center; gap: 16px; min-height: 44px; padding: 18px 20px; border-radius: 14px; color: var(--text); background: var(--surface-2); border: 1px solid var(--border); }
    a.show { text-decoration: none; transition: transform 150ms ease, border-color 150ms ease, background 150ms ease; }
    a.show:hover { transform: translateY(-1px); border-color: var(--accent-strong); background: var(--secondary-bg); color: var(--text); }
    a.show:hover span:last-child { color: var(--accent-strong); }
    a.show span:last-child { color: var(--accent); font-weight: 700; white-space: nowrap; }
    .show-title { flex: 1; }
    .show.processing { opacity: 0.65; cursor: default; }
    .show.processing span:last-child { color: var(--warn-text); white-space: nowrap; }
    .empty, .status { text-align: center; padding: 48px 16px; color: var(--text-muted); }
    .status .btn { margin-top: 18px; }
    .error { color: var(--error-text); }
    .skip-link:focus { position: fixed; top: 16px; left: 16px; z-index: 10; width: auto; height: auto; margin: 0; padding: .65rem 1rem; overflow: visible; clip: auto; white-space: normal; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); }
    @media (prefers-reduced-motion: reduce) {
      a.show { transition: none; }
      a.show:hover { transform: none; }
    }
  </style>
</head>
<body>
  <a class="sr-only skip-link" href="#shows">Skip to shows</a>
  <main>
    <header>
      <div>
        <h1>Video Library</h1>
        <p>Choose a show to start playback.</p>
      </div>
      <form method="post" action="/logout">
        <button class="btn btn--secondary btn--pill" type="submit">Sign out</button>
      </form>
    </header>

    <section class="card" aria-live="polite">
      <div id="status" class="status">Loading shows…</div>
      <ul id="shows" tabindex="-1" hidden></ul>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const showsEl = document.getElementById('shows');
    let pollTimer = null;

    function displayName(slug) {
      return String(slug || '')
        .replace(/[_-]+/g, ' ')
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .map((word) => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
        .join(' ') || 'Untitled Show';
    }

    async function loadShows() {
      try {
        const response = await fetch('/api/shows', { credentials: 'same-origin' });
        if (response.status === 401) {
          location.href = '/login';
          return;
        }
        if (!response.ok) {
          throw new Error('Unable to load shows.');
        }

        const shows = await response.json();
        renderShows(Array.isArray(shows) ? shows : []);
      } catch (error) {
        renderLoadError();
      }
    }


    function renderLoadError() {
      statusEl.hidden = false;
      statusEl.textContent = '';
      statusEl.classList.add('error');
      showsEl.hidden = true;
      schedulePoll(false);

      const message = document.createElement('div');
      message.textContent = 'Sorry, the show list could not be loaded.';
      const retry = document.createElement('button');
      retry.type = 'button';
      retry.className = 'btn btn--secondary';
      retry.textContent = 'Try again';
      retry.addEventListener('click', loadShows);
      statusEl.append(message, retry);
    }

    function renderShows(shows) {
      showsEl.textContent = '';
      const processingCount = shows.filter((s) => s.status === 'processing').length;

      if (shows.length === 0) {
        statusEl.hidden = false;
        statusEl.classList.remove('error');
        statusEl.textContent = '';
        const message = document.createElement('div');
        message.textContent = 'No videos are ready to watch yet.';
        const refresh = document.createElement('button');
        refresh.type = 'button';
        refresh.className = 'btn btn--secondary';
        refresh.textContent = 'Refresh';
        refresh.addEventListener('click', loadShows);
        statusEl.append(message, refresh);
        showsEl.hidden = true;
        schedulePoll(false);
        return;
      }

      statusEl.classList.remove('error');
      statusEl.hidden = processingCount === 0;
      statusEl.textContent = '';
      if (processingCount > 0) {
        statusEl.textContent = 'Preparing ' + processingCount + ' video(s) for streaming… this page updates automatically.';
      }
      showsEl.hidden = false;

      for (const show of shows) {
        const name = String(show.name || 'Untitled show');
        const titleText = displayName(name);
        const item = document.createElement('li');

        if (show.status === 'processing' || !show.playlist) {
          const row = document.createElement('div');
          row.className = 'show processing';
          const title = document.createElement('span');
          title.className = 'show-title';
          title.textContent = titleText;
          const state = document.createElement('span');
          state.textContent = 'Processing…';
          row.append(title, state);
          item.append(row);
        } else {
          const link = document.createElement('a');
          link.className = 'show';
          link.href = '/player?show=' + encodeURIComponent(name);
          const title = document.createElement('span');
          title.className = 'show-title';
          title.textContent = titleText;
          const action = document.createElement('span');
          action.textContent = 'Play ›';
          link.append(title, action);
          item.append(link);
        }

        showsEl.append(item);
      }

      // Auto-refresh while any video is still being segmented.
      schedulePoll(processingCount > 0);
    }

    function schedulePoll(active) {
      if (pollTimer) {
        clearTimeout(pollTimer);
        pollTimer = null;
      }
      if (active) {
        pollTimer = setTimeout(loadShows, 4000);
      }
    }

    loadShows();
  </script>
</body>
</html>
