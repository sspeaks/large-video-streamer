<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Library</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; background: #0b1020; color: #edf2ff; }
    main { width: min(920px, calc(100% - 32px)); margin: 0 auto; padding: 48px 0; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 32px; }
    h1 { margin: 0; font-size: clamp(2rem, 5vw, 3.5rem); letter-spacing: -0.05em; }
    p { color: #aab6d3; line-height: 1.6; }
    .card { background: linear-gradient(180deg, #151b2e, #111728); border: 1px solid #25304a; border-radius: 20px; padding: 24px; box-shadow: 0 20px 80px rgb(0 0 0 / 0.3); }
    ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 12px; }
    a.show { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 18px 20px; border-radius: 14px; color: #edf2ff; text-decoration: none; background: #1b2338; border: 1px solid #2a3654; transition: transform 150ms ease, border-color 150ms ease, background 150ms ease; }
    a.show:hover, a.show:focus-visible { transform: translateY(-1px); border-color: #7aa2ff; background: #222d49; outline: none; }
    a.show span:last-child { color: #8fb3ff; }
    button { border: 1px solid #3a4663; border-radius: 999px; background: #192036; color: #edf2ff; padding: 10px 16px; cursor: pointer; }
    button:hover, button:focus-visible { border-color: #8fb3ff; outline: none; }
    .empty, .status { text-align: center; padding: 48px 16px; color: #aab6d3; }
    .error { color: #ffb4b4; }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Video Library</h1>
        <p>Choose a show to start playback.</p>
      </div>
      <form method="post" action="/logout">
        <button type="submit">Sign out</button>
      </form>
    </header>

    <section class="card" aria-live="polite">
      <div id="status" class="status">Loading shows…</div>
      <ul id="shows" hidden></ul>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const showsEl = document.getElementById('shows');

    async function loadShows() {
      try {
        const response = await fetch('/api/shows', { credentials: 'same-origin' });
        if (response.status === 401) {
          location.href = '/login';
          return;
        }
        if (!response.ok) {
          throw new Error('Unable to load shows.');
        }

        const shows = await response.json();
        renderShows(Array.isArray(shows) ? shows : []);
      } catch (error) {
        statusEl.textContent = 'Sorry, the show list could not be loaded.';
        statusEl.classList.add('error');
      }
    }

    function renderShows(shows) {
      showsEl.textContent = '';
      if (shows.length === 0) {
        statusEl.textContent = 'No shows are available yet. Add media and check back here.';
        showsEl.hidden = true;
        return;
      }

      statusEl.hidden = true;
      showsEl.hidden = false;
      for (const show of shows) {
        const name = String(show.name || 'Untitled show');
        const item = document.createElement('li');
        const link = document.createElement('a');
        link.className = 'show';
        link.href = '/player?show=' + encodeURIComponent(name);

        const title = document.createElement('span');
        title.textContent = name;
        const action = document.createElement('span');
        action.textContent = 'Play →';

        link.append(title, action);
        item.append(link);
        showsEl.append(item);
      }
    }

    loadShows();
  </script>
</body>
</html>
